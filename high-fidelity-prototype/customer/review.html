<h1>Leave a Review</h1>
<div class="form-card">
    <label>Group: </label>
    <select>
        <option value="">Choose a group you've joined</option>
        <option value="yoga">Morning Yoga Meetup</option>
        <option value="cars">Cars and Coffee</option>
    </select>
    <label>Rating: </label>
    <input type="text" placeholder="1-5 stars">
    <label>Review: </label>
    <textarea placeholder="Share your experience with this group..."></textarea>
    <button>Submit Review</button>
</div>
<p>Not seeing a group listed? You can only review circles you've joined, <a href="search.html">find one to join here</a>.</p>
