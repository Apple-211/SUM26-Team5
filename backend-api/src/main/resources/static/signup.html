<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topbar">
    <h2>HobbyCircles</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
    </nav>
</div>
<hr>
<h1>Create Your Profile</h1>
<div class="form-card">
    <label>Full Name: </label>
    <input type="text" id="name" placeholder="e.g. Ashley Crespo">
    <label>Email: </label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Password: </label>
    <input type="password" id="password" placeholder="Create a password">
    <label>Hobbies / Interests: </label>
    <input type="text" id="hobbies" placeholder="e.g. hiking, board games, coding">
    <label>Location: </label>
    <input type="text" id="location" placeholder="City / Area">
    <button id="createProfileBtn">Create Profile</button>
    <p id="signupMessage"></p>
</div>
<p>Already have an account? <a href="login.html">Login here</a></p>

<script>
document.getElementById('createProfileBtn').addEventListener('click', async () => {
    const messageEl = document.getElementById('signupMessage');
    const customer = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        hobbies: document.getElementById('hobbies').value,
        location: document.getElementById('location').value,
        accountStatus: "active"
    };

    if (!customer.name || !customer.email || !customer.password) {
        messageEl.textContent = "Name, email, and password are required.";
        return;
    }

    try {
        const response = await fetch('/api/customers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(customer)
        });

        if (!response.ok) {
            throw new Error('Signup failed: ' + response.status);
        }

        const createdCustomer = await response.json();
        localStorage.setItem('customerId', createdCustomer.customerId);
        localStorage.setItem('customerName', createdCustomer.name);
        messageEl.textContent = "Profile created! Redirecting to your dashboard...";
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    } catch (err) {
        messageEl.textContent = "Something went wrong creating your profile. Please try again.";
        console.error(err);
    }
});
</script>

</body>
</html>
